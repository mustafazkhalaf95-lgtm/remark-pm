# ═══════════════════════════════════════════════════════════════
# Remark PM — Nginx Configuration
# Add this block INSIDE your existing server {} block for remark-agency.com
# ═══════════════════════════════════════════════════════════════

# --- Add this inside the existing server block for remark-agency.com ---

    # Remark PM App (Next.js on port 3001)
    location /work/workflow/ {
        proxy_pass http://127.0.0.1:3001/work/workflow/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # SSE support (for real-time updates)
        proxy_buffering off;
        proxy_cache off;
    }

    # Next.js static files
    location /work/workflow/_next/static/ {
        proxy_pass http://127.0.0.1:3001/work/workflow/_next/static/;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

# --- End of Remark PM block ---
